<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Site - yuuu.jp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 0.5rem; }
    .status {
      margin-top: 2rem; padding: 1rem 2rem;
      background: rgba(255,255,255,0.15); border-radius: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SanityAgents Test Site</h1>
    <p>このサイトは SanityAgents によって自動作成されました</p>
    <p>Powered by GitHub + Cloudflare Pages + Sanity CMS</p>
    <div class="status">
      <p>Deploy: <span id="time"></span></p>
      <p>Domain: test.yuuu.jp</p>
    </div>
  </div>
  <script>document.getElementById('time').textContent = new Date().toISOString();</script>
</body>
</html>
